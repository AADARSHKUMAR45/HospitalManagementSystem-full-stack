<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }

    /* Navbar */
    .navbar {
      background: #1a73e8; color: white; padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .navbar h1 { font-size: 20px; font-weight: 600; }
    .navbar span { font-size: 13px; opacity: 0.85; }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    /* Stat Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: white; border-radius: 10px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #1a73e8;
    }
    .stat-card.green { border-color: #34a853; }
    .stat-card.orange { border-color: #fbbc04; }
    .stat-card.red { border-color: #ea4335; }
    .stat-card .label { font-size: 13px; color: #666; margin-bottom: 6px; }
    .stat-card .value { font-size: 32px; font-weight: 700; color: #222; }

    /* Charts Row */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card {
      background: white; border-radius: 10px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .chart-card h3 { font-size: 14px; color: #444; margin-bottom: 16px; font-weight: 600; }
    .chart-wrap { position: relative; height: 220px; }

    /* Table Section */
    .table-card {
      background: white; border-radius: 10px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .table-header h3 { font-size: 15px; font-weight: 600; }
    .search-box {
      padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; width: 220px; outline: none;
    }
    .search-box:focus { border-color: #1a73e8; }
    .btn-add {
      background: #1a73e8; color: white; border: none; padding: 8px 18px;
      border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500;
    }
    .btn-add:hover { background: #1558c0; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8f9fa; text-align: left; padding: 10px 12px; color: #555; font-weight: 600; border-bottom: 2px solid #eee; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; color: #333; }
    tr:hover td { background: #f8fbff; }

    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge.admitted   { background: #e8f5e9; color: #2e7d32; }
    .badge.discharged { background: #e3f2fd; color: #1565c0; }
    .badge.observation{ background: #fff8e1; color: #f57f17; }

    .btn-del {
      background: #fce8e6; color: #c62828; border: none; padding: 4px 12px;
      border-radius: 5px; font-size: 12px; cursor: pointer;
    }
    .btn-del:hover { background: #ea4335; color: white; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 12px; padding: 28px;
      width: 480px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; color: #666; font-weight: 500; }
    .form-group input, .form-group select {
      padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #1a73e8; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .btn-cancel { background: #f1f3f4; border: none; padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-save { background: #1a73e8; color: white; border: none; padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-save:hover { background: #1558c0; }

    @media (max-width: 700px) {
      .charts-row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <h1>🏥 Hospital Management System</h1>
  <span>REST API: localhost:8080</span>
</div>

<div class="container">

  <!-- Stat Cards -->
  <div class="stats-grid">
    <div class="stat-card"><div class="label">Total Patients</div><div class="value" id="total">—</div></div>
    <div class="stat-card green"><div class="label">Admitted</div><div class="value" id="admitted">—</div></div>
    <div class="stat-card red"><div class="label">Discharged</div><div class="value" id="discharged">—</div></div>
    <div class="stat-card orange"><div class="label">Under Observation</div><div class="value" id="observation">—</div></div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <h3>Patients by Department</h3>
      <div class="chart-wrap"><canvas id="deptChart" role="img" aria-label="Bar chart of patients by department"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Patient Status Distribution</h3>
      <div class="chart-wrap"><canvas id="statusChart" role="img" aria-label="Doughnut chart of patient status"></canvas></div>
    </div>
  </div>

  <!-- Patient Table -->
  <div class="table-card">
    <div class="table-header">
      <h3>All Patients</h3>
      <input class="search-box" id="searchBox" placeholder="Search by name..." oninput="searchPatients(this.value)" />
      <button class="btn-add" onclick="openModal()">+ Add Patient</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Name</th><th>Age</th><th>Gender</th>
          <th>Disease</th><th>Department</th><th>Status</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="patientTable"></tbody>
    </table>
  </div>
</div>

<!-- Add Patient Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Add New Patient</h3>
    <div class="form-grid">
      <div class="form-group full"><label>Full Name</label><input id="f-name" placeholder="e.g. Rahul Kumar"/></div>
      <div class="form-group"><label>Age</label><input id="f-age" type="number" placeholder="25"/></div>
      <div class="form-group"><label>Gender</label>
        <select id="f-gender"><option>Male</option><option>Female</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Disease</label><input id="f-disease" placeholder="e.g. Fever"/></div>
      <div class="form-group"><label>Department</label>
        <select id="f-dept">
          <option>Cardiology</option><option>Neurology</option><option>Orthopedics</option>
          <option>Pediatrics</option><option>General Medicine</option><option>ENT</option><option>Dermatology</option>
        </select>
      </div>
      <div class="form-group"><label>Admission Date</label><input id="f-date" type="date"/></div>
      <div class="form-group"><label>Status</label>
        <select id="f-status"><option>Admitted</option><option>Discharged</option><option>Under Observation</option></select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addPatient()">Save Patient</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api/patients';
  let deptChart, statusChart;

  // ── Load dashboard stats ──────────────────────────────────────
  async function loadStats() {
    try {
      const res = await fetch(`${API}/stats`);
      const data = await res.json();

      document.getElementById('total').textContent       = data.totalPatients;
      document.getElementById('admitted').textContent    = data.admitted;
      document.getElementById('discharged').textContent  = data.discharged;
      document.getElementById('observation').textContent = data.underObservation;

      const depts  = Object.keys(data.byDepartment);
      const counts = Object.values(data.byDepartment);

      if (deptChart) deptChart.destroy();
      deptChart = new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: {
          labels: depts,
          datasets: [{
            label: 'Patients',
            data: counts,
            backgroundColor: ['#4285f4','#34a853','#fbbc04','#ea4335','#9c27b0','#00bcd4','#ff5722'],
            borderRadius: 5
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, grid: { color: '#f0f0f0' } } }
        }
      });

      if (statusChart) statusChart.destroy();
      statusChart = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
          labels: ['Admitted', 'Discharged', 'Under Observation'],
          datasets: [{
            data: [data.admitted, data.discharged, data.underObservation],
            backgroundColor: ['#34a853', '#4285f4', '#fbbc04'],
            borderWidth: 0, hoverOffset: 6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 12 } } } }
        }
      });
    } catch(e) {
      console.error('Stats load failed:', e);
    }
  }

  // ── Load patients table ───────────────────────────────────────
  async function loadPatients(url = API) {
    try {
      const res = await fetch(url);
      const patients = await res.json();
      renderTable(patients);
    } catch(e) {
      document.getElementById('patientTable').innerHTML =
        '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">Could not connect to API. Make sure Spring Boot is running on port 8080.</td></tr>';
    }
  }

  function renderTable(patients) {
    const tbody = document.getElementById('patientTable');
    if (!patients.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px;">No patients found.</td></tr>';
      return;
    }
    tbody.innerHTML = patients.slice(0, 50).map((p, i) => `
      <tr>
        <td>${p.id}</td>
        <td><strong>${p.name}</strong></td>
        <td>${p.age}</td>
        <td>${p.gender}</td>
        <td>${p.disease}</td>
        <td>${p.department}</td>
        <td><span class="badge ${badgeClass(p.status)}">${p.status}</span></td>
        <td><button class="btn-del" onclick="deletePatient(${p.id})">Delete</button></td>
      </tr>
    `).join('');
  }

  function badgeClass(status) {
    if (status === 'Admitted') return 'admitted';
    if (status === 'Discharged') return 'discharged';
    return 'observation';
  }

  // ── Search ────────────────────────────────────────────────────
  function searchPatients(name) {
    if (name.trim().length < 2) { loadPatients(); return; }
    loadPatients(`${API}/search?name=${encodeURIComponent(name)}`);
  }

  // ── Add Patient ───────────────────────────────────────────────
  function openModal() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

  async function addPatient() {
    const body = {
      name: document.getElementById('f-name').value,
      age: parseInt(document.getElementById('f-age').value),
      gender: document.getElementById('f-gender').value,
      disease: document.getElementById('f-disease').value,
      department: document.getElementById('f-dept').value,
      admissionDate: document.getElementById('f-date').value,
      status: document.getElementById('f-status').value
    };
    if (!body.name || !body.age || !body.disease) { alert('Please fill all fields'); return; }

    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    closeModal();
    loadPatients();
    loadStats();
  }

  // ── Delete Patient ────────────────────────────────────────────
  async function deletePatient(id) {
    if (!confirm('Delete this patient record?')) return;
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    loadPatients();
    loadStats();
  }

  // ── Init ──────────────────────────────────────────────────────
  loadStats();
  loadPatients();
</script>
</body>
</html>
